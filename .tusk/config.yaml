service:
  name: example-express-server
  port: 3000
  start:
    command: npm run start
  readiness_check:
    command: curl -fsS http://localhost:3000/health
    timeout: 30s
    interval: 1s
  id: 76a5902e-ba98-46b0-825a-def9574c20be

traces:
  dir: .tusk/traces

test_execution:
  timeout: 30s

recording:
  sampling_rate: 0.1
  export_spans: true
  enable_env_var_recording: false
